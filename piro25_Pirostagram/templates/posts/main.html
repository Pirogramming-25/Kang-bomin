{% extends 'base.html' %}

{% block content %}
{% for post in posts %}
<div class="post-card">
    <p><strong>{{ post.author.username }}</strong></p>
    <img src="{{ post.image.url }}" width="400">
    <p>{{ post.content }}</p>
    {% if post.author == user %}
        <a href="{% url 'posts:post_update' post.pk %}">수정</a>
        <a href="{% url 'posts:post_delete' post.pk %}">삭제</a>
    {% endif %}
</div>
{% endfor %}

{% endblock %}
