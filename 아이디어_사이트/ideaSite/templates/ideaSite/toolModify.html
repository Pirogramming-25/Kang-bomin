{% extends 'base.html' %}

{% block title %}{{ devtool.name }}{% endblock %}

{% block content %}

    <h1>개발툴 수정</h1>
    <form method = 'POST'>
        {% csrf_token %}

        <p>이름: <input type = 'text' name = 'name' value = '{{ devtool.name }}' required></p>
        <p>종류: <input type = 'text' name = 'kind' value = '{{ devtool.kind }}' required></p>
        <p>내용: <textarea name = 'content' required>{{ devtool.content }}</textarea></p>
        <button type = "submit">완료</button>
    </form>
    <a href="{% url 'toolDetail' devtool.id %}"><button>취소</button></a>

{% endblock %}
