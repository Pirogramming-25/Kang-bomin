{% extends 'base.html' %}

{% block title %}아이디어 등록{% endblock %}

{% block content %}
    <h1>Idea Add</h1>

    <form method = 'POST' enctype="multipart/form-data" class="add-form">
        {% csrf_token %}

        <p>제목: <input type = 'text' name = 'title' required></p>
        <p>이미지: <input type = 'file' name = 'image' accept = 'image/*' required></p>
        <p>내용: <textarea name = 'content' required></textarea>
        <p>관심도: <input type = 'number' name = 'interest' value = '0'></p>
        <p>개발툴:
            <select name = 'devtool' required>
                {% for devtool in devtools %}
                    <option value = "{{ devtool.id}}">{{ devtool.name }}</option>
                {% endfor %}
            </select>
        </p>

        <div class="form-buttons">
            <button type="submit">등록</button>
            <a href="{% url 'list' %}"><button type="button" class="btn-gray">취소</button></a>
        </div>
    </form>
{% endblock %}
