{% extends 'base.html' %}

{% block title %}{{ idea.title }}{% endblock %}

{% block content %}
<div class="detail-container">
    <h1>
        {{ idea.title }}
        <span class="star-btn {% if idea.star %}starred{% endif %}"
        data-id="{{ idea.id }}" id="star-{{ idea.id }}">★</span>
    </h1>

    <img src = "{{ idea.image.url }}" class="detail-img">

    <div class="detail-info">
    <p>{{ idea.content }}</p>
    <p>관심도: {{ idea.interest }}</p>
    <p>개발툴:
        <a href = "{% url 'toolDetail' idea.devtool.id %}">{{ idea.devtool.name }}</a>
    </p>
    <p>등록일: {{ idea.created_at }}</p>
    </div>

    <div class="detail-buttons">
    <a href = "{% url 'modify' idea.id %}"><button>수정</button></a>
    <a href = "{% url 'delete' idea.id %}"><button>삭제</button></a>
    <a href="{% url 'list' %}"><button>아이디어 목록으로</button></a> 
    </div>
</div>

<script>
    document.querySelectorAll('.star-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            const id = btn.dataset.id;

            fetch(`/star/${id}/`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-CSRFToken': '{{ csrf_token }}',
                },
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById(`star-${id}`).classList.toggle('starred', data.starred);
            });
        });
    });
</script>
{% endblock %}
