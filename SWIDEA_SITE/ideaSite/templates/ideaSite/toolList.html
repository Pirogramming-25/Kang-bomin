{% extends 'base.html' %}

{% block title %}개발툴 리스트{% endblock %}

{% block content %}

<h1>Devtool</h1>

<div class="tool-list">
    {% for devtool in devtools %}
        <div class="tool-item">
            <h3><a href="{% url 'toolDetail' devtool.id %}">{{ devtool.name }}</a></h3>
            <span class="tool-kind">{{ devtool.kind }}</span>
            <span class="tool-content">{{ devtool.content|truncatechars:40 }}</span>
        </div>
    {% empty %}
        <p>등록된 개발툴이 없습니다.</p>
    {% endfor %}
</div>
{% endblock %}
