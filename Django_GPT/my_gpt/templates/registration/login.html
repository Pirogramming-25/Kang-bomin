{% extends "my_gpt/base.html" %}

{% block content %}
<h1>로그인</h1>

{% if request.GET.required == "1" %}
<script>
    alert("로그인 후 이용해주세요");
</script>
{% endif %}

{% if form.errors %}
<p class="error">아이디 또는 비밀번호가 올바르지 않습니다.</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <div>
        <label for="id_username">아이디</label>
        {{ form.username }}
    </div>
    <div>
        <label for="id_password">비밀번호</label>
        {{ form.password }}
    </div>
    <input type="hidden" name="next" value="{{ next }}">
    <button type="submit">로그인</button>
</form>
{% endblock %}
